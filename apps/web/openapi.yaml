openapi: 3.1.0
info:
  title: Clog API
  description: 클라이밍 커뮤니티 앱 API
  version: 1.0.0
servers:
  - url: /

# ── paths ──────────────────────────────────────────────────────

paths:
  # ── Gyms ──
  /api/v1/gyms:
    get:
      operationId: getGyms
      summary: 암장 목록 (무한스크롤)
      tags: [Gyms]
      parameters:
        - { name: cursor, in: query, schema: { type: string, format: uuid } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
        - {
            name: region,
            in: query,
            schema: { $ref: "#/components/schemas/Region" },
          }
        - { name: search, in: query, schema: { type: string } }
        - {
            name: sort,
            in: query,
            schema:
              {
                type: string,
                enum: [name, rating, congestion, reviewCount, visitorCount, monthlyCheckInCount],
                default: name,
              },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/PaginatedGymListItem"

  /api/v1/gyms/{gymId}:
    get:
      operationId: getGym
      summary: 암장 상세
      tags: [Gyms]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/GymDetail"

  /api/v1/gyms/{gymId}/membership-plans:
    get:
      operationId: getGymMembershipPlans
      summary: 암장 회원권 요금표 (활성 행만)
      tags: [Gyms]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    type: array
                    items: { $ref: "#/components/schemas/GymMembershipPlan" }
        "404":
          description: Not Found

  /api/v1/gyms/{gymId}/check-in:
    post:
      operationId: checkInGym
      summary: 암장 체크인
      tags: [Gyms]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/CheckInResult"

  /api/v1/gyms/{gymId}/check-out:
    post:
      operationId: checkOutGym
      summary: 암장 체크아웃
      tags: [Gyms]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/CheckOutResult"

  /api/v1/gyms/{gymId}/reviews:
    get:
      operationId: getGymReviews
      summary: 리뷰 목록 (무한스크롤)
      tags: [Reviews]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - { name: cursor, in: query, schema: { type: string, format: uuid } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/PaginatedReviewListItem"
    post:
      operationId: createReview
      summary: 리뷰 작성
      tags: [Reviews]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/Review"

  /api/v1/gyms/{gymId}/reviews/me:
    get:
      operationId: getMyGymReview
      summary: 내 리뷰 (해당 암장)
      tags: [Reviews]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    oneOf:
                      - { $ref: "#/components/schemas/ReviewListItem" }
                      - { type: "null" }
        "401":
          description: Unauthorized

  /api/v1/gyms/{gymId}/reviews/{reviewId}:
    get:
      operationId: getGymReviewById
      summary: 리뷰 단건
      tags: [Reviews]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: reviewId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/ReviewListItem"
        "404":
          description: Not Found
    patch:
      operationId: updateGymReview
      summary: 리뷰 수정
      tags: [Reviews]
      parameters:
        - {
            name: gymId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: reviewId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReviewBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/Review"
        "403":
          description: Forbidden
        "404":
          description: Not Found

  # ── Records ──
  /api/v1/records:
    get:
      operationId: getRecords
      summary: 기록 목록 (무한스크롤)
      tags: [Records]
      parameters:
        - { name: cursor, in: query, schema: { type: string, format: uuid } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
        - {
            name: month,
            in: query,
            schema: { type: string, pattern: '^\d{4}-\d{2}$' },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/PaginatedRecordListItem"
    post:
      operationId: createRecord
      summary: 기록 생성
      tags: [Records]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/RecordDetail"

  /api/v1/records/{recordId}:
    get:
      operationId: getRecord
      summary: 기록 상세
      tags: [Records]
      parameters:
        - {
            name: recordId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/RecordDetail"
    patch:
      operationId: updateRecord
      summary: 기록 수정
      tags: [Records]
      parameters:
        - {
            name: recordId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/RecordDetail"
    delete:
      operationId: deleteRecord
      summary: 기록 삭제
      tags: [Records]
      parameters:
        - {
            name: recordId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload: { type: "null" }

  # ── Posts ──
  /api/v1/posts:
    get:
      operationId: getPosts
      summary: 게시글 목록 (무한스크롤)
      tags: [Posts]
      parameters:
        - { name: cursor, in: query, schema: { type: string, format: uuid } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
        - {
            name: category,
            in: query,
            schema: { $ref: "#/components/schemas/CommunityCategory" },
          }
        - { name: search, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/PaginatedPostListItem"
    post:
      operationId: createPost
      summary: 게시글 작성
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/Post"

  /api/v1/posts/{postId}:
    get:
      operationId: getPost
      summary: 게시글 상세
      tags: [Posts]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/PostDetail"
    patch:
      operationId: updatePost
      summary: 게시글 수정
      tags: [Posts]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      summary: 게시글 삭제
      tags: [Posts]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload: { type: "null" }

  /api/v1/posts/{postId}/view:
    post:
      operationId: recordPostView
      summary: 게시글 조회수 증가 (세션당 1회 호출 권장)
      tags: [Posts]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    type: object
                    required: [viewCount]
                    properties:
                      viewCount: { type: integer }

  /api/v1/posts/{postId}/like:
    post:
      operationId: togglePostLike
      summary: 좋아요 토글
      tags: [Posts]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    type: object
                    required: [liked]
                    properties:
                      liked: { type: boolean }

  /api/v1/posts/{postId}/bookmark:
    post:
      operationId: togglePostBookmark
      summary: 북마크 토글
      tags: [Posts]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    type: object
                    required: [bookmarked]
                    properties:
                      bookmarked: { type: boolean }

  /api/v1/posts/{postId}/comments:
    get:
      operationId: getPostComments
      summary: 댓글 목록 (무한스크롤)
      tags: [Comments]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - { name: cursor, in: query, schema: { type: string, format: uuid } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    $ref: "#/components/schemas/PaginatedCommentListItem"
    post:
      operationId: createComment
      summary: 댓글 작성
      tags: [Comments]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/CommentWithAuthor"

  /api/v1/posts/{postId}/comments/{commentId}:
    patch:
      operationId: updateComment
      summary: 댓글 수정
      tags: [Comments]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: commentId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/CommentWithAuthor"
    delete:
      operationId: deleteComment
      summary: 댓글 삭제
      tags: [Comments]
      parameters:
        - {
            name: postId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: commentId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload: { type: "null" }

  # ── Users ──
  /api/v1/users/me:
    get:
      operationId: getMe
      summary: 내 정보 (비로그인 시에도 200, payload null)
      tags: [Users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/UserMe"
    patch:
      operationId: updateMe
      summary: 내 정보 수정
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    $ref: "#/components/schemas/User"
    delete:
      operationId: deleteMe
      summary: 회원 탈퇴
      tags: [Users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload: { nullable: true }

  /api/v1/users/me/memberships:
    get:
      operationId: getMyMemberships
      summary: 내 회원권 목록
      tags: [Users]
      parameters:
        - { name: gymId, in: query, schema: { type: string, format: uuid } }
        - {
            name: activeOnly,
            in: query,
            schema: { type: string, enum: ["true", "false"] },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    type: array
                    items: { $ref: "#/components/schemas/UserMembership" }
        "401":
          description: Unauthorized
    post:
      operationId: createMyMembership
      summary: 내 회원권 등록
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserMembershipBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload: { $ref: "#/components/schemas/UserMembership" }

  /api/v1/users/me/memberships/{userMembershipId}:
    get:
      operationId: getMyMembershipById
      summary: 내 회원권 상세
      tags: [Users]
      parameters:
        - {
            name: userMembershipId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload: { $ref: "#/components/schemas/UserMembership" }
        "401":
          description: Unauthorized
        "404":
          description: Not Found
    patch:
      operationId: patchMyMembership
      summary: 내 회원권 수정
      tags: [Users]
      parameters:
        - {
            name: userMembershipId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchUserMembershipBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload: { $ref: "#/components/schemas/UserMembership" }
    delete:
      operationId: deleteMyMembership
      summary: 내 회원권 삭제
      tags: [Users]
      parameters:
        - {
            name: userMembershipId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload:
                    type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean }

  /api/v1/users/me/memberships/{userMembershipId}/usage:
    get:
      operationId: getMyMembershipUsage
      summary: 회원권 사용 내역·통계
      tags: [Users]
      parameters:
        - {
            name: userMembershipId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload: { $ref: "#/components/schemas/UserMembershipUsagePayload" }
        "401":
          description: Unauthorized
        "404":
          description: Not Found

  /api/v1/users/me/memberships/{userMembershipId}/pauses:
    post:
      operationId: createMembershipPause
      summary: 회원권 일시정지 추가
      tags: [Users]
      parameters:
        - {
            name: userMembershipId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMembershipPauseBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [toast, payload]
                properties:
                  toast: { type: string }
                  payload: { $ref: "#/components/schemas/UserMembership" }

