openapi: 3.0.0
info:
  title: Clog API
  version: 1.0.0
  description: 클라이밍 커뮤니티 앱 API
servers:
  - url: /
components:
  schemas:
    Region:
      type: string
      enum:
        - SEOUL
        - GYEONGGI
        - INCHEON
        - BUSAN
    GymMembershipBrand:
      type: string
      enum:
        - THE_CLIMB
        - SEOULFOREST
        - CLIMBINGPARK
        - SONCLIMB
        - PEAKERS
        - WAVEROCK
        - CLIMB_US
        - DAMJANG
        - B_BLOC
        - ALLEZ
        - STANDALONE
    FacilityType:
      type: string
      enum:
        - PARKING
        - SHOWER
        - LOCKER
        - REST_AREA
        - TRAINING
    Role:
      type: string
      enum:
        - ADMIN
        - MANAGER
        - GUEST
    AdminAuditAction:
      type: string
      enum:
        - CREATE
        - UPDATE
        - DELETE
        - CLOSE
        - REOPEN
        - ROLE_CHANGE
    PaginatedGymListItem:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GymListItem'
        nextCursor:
          type: string
          nullable: true
      required:
        - items
        - nextCursor
    GymListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        region:
          $ref: '#/components/schemas/Region'
        phone:
          type: string
        notice:
          type: string
          nullable: true
        congestion:
          type: integer
        visitorCapacity:
          type: integer
        latitude:
          type: number
        longitude:
          type: number
        description:
          type: string
        avgRating:
          type: number
        reviewCount:
          type: integer
        website:
          type: string
          nullable: true
        coverImageUrl:
          type: string
        logoImageUrl:
          type: string
        difficultyImageUrl:
          type: string
          nullable: true
        settingScheduleMemo:
          type: string
          nullable: true
        instagramId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        membershipBrand:
          $ref: '#/components/schemas/GymMembershipBrand'
        facilities:
          type: array
          items:
            $ref: '#/components/schemas/FacilityType'
        isClosed:
          type: boolean
        closedAt:
          type: string
          nullable: true
          format: date-time
        openHours:
          type: array
          items:
            $ref: '#/components/schemas/GymOpenHour'
        visitorCount:
          type: integer
        monthlyCheckInCount:
          type: integer
          nullable: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/GymImage'
        difficultyColors:
          type: array
          items:
            $ref: '#/components/schemas/GymDifficultyColor'
      required:
        - id
        - name
        - address
        - region
        - phone
        - notice
        - congestion
        - visitorCapacity
        - latitude
        - longitude
        - description
        - avgRating
        - reviewCount
        - website
        - coverImageUrl
        - logoImageUrl
        - difficultyImageUrl
        - settingScheduleMemo
        - instagramId
        - createdAt
        - updatedAt
        - membershipBrand
        - facilities
        - isClosed
        - closedAt
        - openHours
        - visitorCount
        - monthlyCheckInCount
        - images
    GymOpenHour:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        dayType:
          $ref: '#/components/schemas/DayType'
        open:
          type: string
        close:
          type: string
      required:
        - id
        - gymId
        - dayType
        - open
        - close
    DayType:
      type: string
      enum:
        - MON
        - TUE
        - WED
        - THU
        - FRI
        - SAT
        - SUN
    GymImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        url:
          type: string
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - gymId
        - url
        - order
        - createdAt
    GymDifficultyColor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        color:
          type: string
        label:
          type: string
        order:
          type: integer
      required:
        - id
        - gymId
        - difficulty
        - color
        - label
        - order
    Difficulty:
      type: string
      enum:
        - V0
        - V1
        - V2
        - V3
        - V4
        - V5
        - V6
        - V7
        - V8
        - V9
        - V10
    GymDetail:
      allOf:
        - $ref: '#/components/schemas/GymListItem'
        - type: object
          properties:
            membershipPlans:
              type: array
              items:
                $ref: '#/components/schemas/GymMembershipPlan'
            myCheckIn:
              type: object
              nullable: true
              properties:
                endsAt:
                  type: string
                  format: date-time
              required:
                - endsAt
          required:
            - membershipPlans
            - myCheckIn
    GymMembershipPlan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        code:
          $ref: '#/components/schemas/MembershipPlanCode'
        priceWon:
          type: integer
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - gymId
        - code
        - priceWon
        - sortOrder
        - isActive
        - createdAt
        - updatedAt
    MembershipPlanCode:
      type: string
      enum:
        - PERIOD_1M
        - PERIOD_3M
        - PERIOD_6M
        - PERIOD_12M
        - COUNT_DAY
        - COUNT_3
        - COUNT_5
        - COUNT_10
    CheckInResult:
      type: object
      properties:
        endsAt:
          type: string
          format: date-time
      required:
        - endsAt
    CheckOutResult:
      type: object
      properties:
        ok:
          type: boolean
        createdSessionId:
          type: string
          nullable: true
          format: uuid
      required:
        - ok
        - createdSessionId
    PaginatedReviewListItem:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewListItem'
        nextCursor:
          type: string
          nullable: true
      required:
        - items
        - nextCursor
    ReviewListItem:
      allOf:
        - $ref: '#/components/schemas/Review'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/AuthorSummary'
          required:
            - user
    GymReviewFeature:
      type: string
      enum:
        - COOL_AIR
        - WIDE_STRETCH
        - VARIOUS_LEVEL
        - KIND_STAFF
        - EASY_PARKING
        - SHOWER_ROOM
        - CLEAN_FACILITY
        - GOOD_VENT
    AuthorSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
        profileImage:
          type: string
          nullable: true
      required:
        - id
        - nickname
        - profileImage
    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
        perceivedDifficulty:
          type: string
          nullable: true
          enum:
            - EASY
            - EASY_NORMAL
            - NORMAL
            - NORMAL_HARD
            - HARD
            - null
        features:
          type: array
          items:
            $ref: '#/components/schemas/GymReviewFeature'
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - gymId
        - rating
        - content
        - features
        - imageUrls
        - createdAt
        - updatedAt
    CreateReviewBody:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
          minLength: 10
          maxLength: 1000
        perceivedDifficulty:
          type: string
          enum:
            - EASY
            - EASY_NORMAL
            - NORMAL
            - NORMAL_HARD
            - HARD
        features:
          type: array
          items:
            $ref: '#/components/schemas/GymReviewFeature'
        imageUrls:
          type: array
          items:
            type: string
            format: uri
      required:
        - rating
        - content
    UpdateReviewBody:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
          minLength: 10
          maxLength: 1000
        perceivedDifficulty:
          type: string
          enum:
            - EASY
            - EASY_NORMAL
            - NORMAL
            - NORMAL_HARD
            - HARD
        features:
          type: array
          items:
            $ref: '#/components/schemas/GymReviewFeature'
        imageUrls:
          type: array
          items:
            type: string
            format: uri
      required:
        - rating
        - content
    UserMe:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
        bio:
          type: string
          nullable: true
        profileImage:
          type: string
          nullable: true
        coverImage:
          type: string
          nullable: true
        instagramId:
          type: string
          nullable: true
        youtubeUrl:
          type: string
          nullable: true
        maxDifficulty:
          allOf:
            - $ref: '#/components/schemas/Difficulty'
            - nullable: true
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        homeGymId:
          type: string
          nullable: true
          format: uuid
        checkInAutoDurationMinutes:
          type: integer
          minimum: 30
          maximum: 720
        pushNotificationsEnabled:
          type: boolean
        homeGym:
          $ref: '#/components/schemas/HomeGymSummary'
        _count:
          $ref: '#/components/schemas/UserCounts'
        visitCount:
          type: integer
        sendCount:
          type: integer
        linkedProviders:
          type: array
          items:
            type: string
            enum:
              - KAKAO
              - GOOGLE
        activeCheckIn:
          $ref: '#/components/schemas/ActiveCheckIn'
      required:
        - id
        - email
        - nickname
        - bio
        - profileImage
        - coverImage
        - instagramId
        - youtubeUrl
        - maxDifficulty
        - role
        - createdAt
        - updatedAt
        - homeGymId
        - checkInAutoDurationMinutes
        - pushNotificationsEnabled
        - homeGym
        - _count
        - visitCount
        - sendCount
        - linkedProviders
        - activeCheckIn
    HomeGymSummary:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
        - id
        - name
    UserCounts:
      type: object
      properties:
        following:
          type: integer
        followers:
          type: integer
        sessions:
          type: integer
      required:
        - following
        - followers
        - sessions
    ActiveCheckIn:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        gymName:
          type: string
        startedAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
      required:
        - id
        - gymId
        - gymName
        - startedAt
        - endsAt
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
        bio:
          type: string
          nullable: true
        profileImage:
          type: string
          nullable: true
        coverImage:
          type: string
          nullable: true
        instagramId:
          type: string
          nullable: true
        youtubeUrl:
          type: string
          nullable: true
        maxDifficulty:
          allOf:
            - $ref: '#/components/schemas/Difficulty'
            - nullable: true
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        homeGymId:
          type: string
          nullable: true
          format: uuid
        checkInAutoDurationMinutes:
          type: integer
          minimum: 30
          maximum: 720
        pushNotificationsEnabled:
          type: boolean
        homeGym:
          $ref: '#/components/schemas/HomeGymSummary'
      required:
        - id
        - email
        - nickname
        - bio
        - profileImage
        - coverImage
        - instagramId
        - youtubeUrl
        - maxDifficulty
        - role
        - createdAt
        - updatedAt
        - homeGymId
        - checkInAutoDurationMinutes
        - pushNotificationsEnabled
        - homeGym
    UpdateUserBody:
      type: object
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 20
        bio:
          type: string
          maxLength: 200
        profileImage:
          type: string
          format: uri
        coverImage:
          type: string
          format: uri
        instagramId:
          type: string
          maxLength: 50
        youtubeUrl:
          type: string
          maxLength: 200
          format: uri
        maxDifficulty:
          $ref: '#/components/schemas/Difficulty'
        checkInAutoDurationMinutes:
          type: integer
          minimum: 30
          maximum: 720
        homeGymId:
          type: string
          nullable: true
          format: uuid
        pushNotificationsEnabled:
          type: boolean
    MyCheckInItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        gymName:
          type: string
        startedAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        endedAt:
          type: string
          nullable: true
          format: date-time
      required:
        - id
        - gymId
        - gymName
        - startedAt
    UserPushDevice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        expoPushToken:
          type: string
        platform:
          $ref: '#/components/schemas/PushPlatform'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - expoPushToken
        - platform
        - createdAt
        - updatedAt
    PushPlatform:
      type: string
      enum:
        - ANDROID
    RegisterPushDeviceBody:
      type: object
      properties:
        token:
          type: string
          minLength: 1
        platform:
          $ref: '#/components/schemas/PushPlatform'
      required:
        - token
        - platform
    UserMembership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        gymId:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        remainingUses:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        startedDateYmd:
          type: string
        plan:
          type: object
          properties:
            id:
              type: string
              format: uuid
            code:
              $ref: '#/components/schemas/MembershipPlanCode'
            priceWon:
              type: integer
            sortOrder:
              type: integer
            isActive:
              type: boolean
          required:
            - id
            - code
            - priceWon
            - sortOrder
            - isActive
        gym:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            membershipBrand:
              $ref: '#/components/schemas/GymMembershipBrand'
            logoImageUrl:
              type: string
              nullable: true
          required:
            - id
            - name
            - membershipBrand
        pauses:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              startDateYmd:
                type: string
              endDateYmd:
                type: string
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
            required:
              - id
              - startDateYmd
              - endDateYmd
              - createdAt
              - updatedAt
        effectiveEndAt:
          type: string
          format: date-time
        lastValidDateYmd:
          type: string
        isActive:
          type: boolean
      required:
        - id
        - userId
        - gymId
        - planId
        - startedAt
        - remainingUses
        - createdAt
        - updatedAt
        - startedDateYmd
        - plan
        - gym
        - pauses
        - effectiveEndAt
        - lastValidDateYmd
        - isActive
    CreateUserMembershipBody:
      type: object
      properties:
        gymId:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        startedDateYmd:
          type: string
        note:
          type: string
          maxLength: 500
      required:
        - gymId
        - planId
        - startedDateYmd
    PatchUserMembershipBody:
      type: object
      properties:
        note:
          type: string
          nullable: true
          maxLength: 500
        startedDateYmd:
          type: string
    UserMembershipUsagePayload:
      type: object
      properties:
        membership:
          type: object
          properties:
            id:
              type: string
              format: uuid
            gymId:
              type: string
              format: uuid
            planCode:
              $ref: '#/components/schemas/MembershipPlanCode'
            startedDateYmd:
              type: string
            lastValidDateYmd:
              type: string
            remainingUses:
              type: integer
              nullable: true
            remainingDays:
              type: integer
            gym:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                membershipBrand:
                  $ref: '#/components/schemas/GymMembershipBrand'
                logoImageUrl:
                  type: string
                  nullable: true
              required:
                - id
                - name
                - membershipBrand
          required:
            - id
            - gymId
            - planCode
            - startedDateYmd
            - lastValidDateYmd
            - remainingUses
            - remainingDays
            - gym
        stats:
          type: object
          properties:
            totalUsed:
              type: number
            weeklyAverage:
              type: number
            usageRatePercent:
              type: number
              nullable: true
            initialCount:
              type: integer
              nullable: true
          required:
            - totalUsed
            - weeklyAverage
        sessions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              date:
                type: string
                format: date-time
              gymName:
                type: string
              gymLogoImageUrl:
                type: string
                nullable: true
              routeCount:
                type: integer
            required:
              - id
              - date
              - gymName
              - routeCount
      required:
        - membership
        - stats
        - sessions
    MembershipPauseItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        startDateYmd:
          type: string
        endDateYmd:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - startDateYmd
        - endDateYmd
        - createdAt
        - updatedAt
    CreateMembershipPauseBody:
      type: object
      properties:
        startDateYmd:
          type: string
        endDateYmd:
          type: string
      required:
        - startDateYmd
        - endDateYmd
    PatchMembershipPauseBody:
      type: object
      properties:
        startDateYmd:
          type: string
        endDateYmd:
          type: string
    PaginatedFollowUser:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuthorSummary'
        nextCursor:
          type: string
          nullable: true
          format: uuid
      required:
        - items
        - nextCursor
    PaginatedPostListItem:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PostListItem'
        nextCursor:
          type: string
          nullable: true
      required:
        - items
        - nextCursor
    PostListItem:
      allOf:
        - $ref: '#/components/schemas/Post'
        - type: object
          properties:
            author:
              $ref: '#/components/schemas/AuthorSummary'
            likes:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                required:
                  - id
            bookmarks:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                required:
                  - id
          required:
            - author
    CommunityCategory:
      type: string
      enum:
        - FREE
        - TIPS
        - REVIEW
        - MEETUP
        - GEAR
    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        category:
          $ref: '#/components/schemas/CommunityCategory'
        title:
          type: string
        content:
          type: string
        viewCount:
          type: integer
        likeCount:
          type: integer
        commentCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - authorId
        - category
        - title
        - content
        - viewCount
        - likeCount
        - commentCount
        - tags
        - imageUrls
        - createdAt
        - updatedAt
    MeStatisticsPayload:
      type: object
      properties:
        period:
          type: string
          enum:
            - week
            - month
            - year
            - all
        anchor:
          type: string
        range:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
            label:
              type: string
          required:
            - start
            - end
            - label
        previousRange:
          type: object
          nullable: true
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
          required:
            - start
            - end
        kpis:
          type: object
          properties:
            totalSends:
              type: integer
