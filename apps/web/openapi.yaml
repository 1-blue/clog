paths:
  /api/v1/admin/gyms:
    get:
      tags:
        - Admin - Gyms
      summary: 암장 목록 (어드민)
      parameters:
        - schema:
            type: string
            format: uuid
          required: false
          name: cursor
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          required: false
          name: limit
          in: query
        - schema:
            type: string
          required: false
          name: search
          in: query
        - schema:
            $ref: '#/components/schemas/Region'
          required: false
          name: region
          in: query
        - schema:
            type: string
            enum:
              - all
              - active
              - closed
            default: all
          required: false
          name: status
          in: query
      responses:
        '200':
          description: 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  payload:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          nullable: true
                      nextCursor:
                        type: string
                        nullable: true
                    required:
                      - items
                      - nextCursor
                required:
                  - payload
        '403':
          description: 관리자 권한 필요
    post:
      tags:
        - Admin - Gyms
      summary: 암장 생성
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                region:
                  $ref: '#/components/schemas/Region'
                address:
                  type: string
                  minLength: 1
                  maxLength: 300
                phone:
                  type: string
                  minLength: 1
                  maxLength: 30
                latitude:
                  type: number
                  minimum: -90
                  maximum: 90
                longitude:
                  type: number
                  minimum: -180
                  maximum: 180
                description:
                  type: string
                  minLength: 1
                  maxLength: 5000
                coverImageUrl:
                  type: string
                  minLength: 1
                  maxLength: 1000
                logoImageUrl:
                  type: string
                  minLength: 1
                  maxLength: 1000
                membershipBrand:
                  $ref: '#/components/schemas/GymMembershipBrand'
                website:
                  type: string
                  nullable: true
                  maxLength: 500
                instagramId:
                  type: string
                  nullable: true
                  maxLength: 100
                notice:
                  type: string
                  nullable: true
                  maxLength: 2000
                difficultyImageUrl:
                  type: string
                  nullable: true
                  maxLength: 1000
                settingScheduleMemo:
                  type: string
                  nullable: true
                  maxLength: 1000
                visitorCapacity:
                  type: integer
                  minimum: 0
                facilities:
                  type: array
                  items:
                    $ref: '#/components/schemas/FacilityType'
              required:
                - name
                - region
                - address
                - phone
                - latitude
                - longitude
                - description
                - coverImageUrl
                - logoImageUrl
                - membershipBrand
      responses:
        '200':
          description: 생성된 암장
          content:
            application/json:
              schema:
                type: object
                properties:
                  payload:
                    nullable: true
