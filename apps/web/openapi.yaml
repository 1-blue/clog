  # ── Upload ──
  /api/v1/upload/presigned:
    post:
      operationId: getPresignedUrl
      summary: S3 Presigned URL 발급
      tags: [Upload]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentType, type]
              properties:
                filename:
                  { type: string, description: "원본 파일명 (확장자 포함)" }
                contentType:
                  { type: string, description: "image/* 또는 video/*" }
                type:
                  type: string
                  enum: [images, videos]
                  description: "S3 경로 세그먼트 (images | videos)"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [payload]
                properties:
                  payload:
                    type: object
                    required: [presignedUrl, publicUrl, key, bucket, type]
                    properties:
                      presignedUrl: { type: string }
                      publicUrl: { type: string }
                      key:
                        type: string
                        description: "{development|production}/{images|videos}/{name}_{ts}.{ext}"
                      bucket: { type: string }
                      type:
                        type: string
                        enum: [images, videos]

# ── components ─────────────────────────────────────────────────

components:
  schemas:
    # ── Enums (Prisma schema.prisma와 동기화) ──
    Region:
      description: |
        지역 (17개 시도)
        SEOUL 서울, GYEONGGI 경기, INCHEON 인천, BUSAN 부산, DAEGU 대구, DAEJEON 대전,
        GWANGJU 광주, ULSAN 울산, SEJONG 세종, GANGWON 강원, CHUNGBUK 충북, CHUNGNAM 충남,
        JEONBUK 전북, JEONNAM 전남, GYEONGBUK 경북, GYEONGNAM 경남, JEJU 제주
      type: string
      enum:
        [
          SEOUL,
          GYEONGGI,
          INCHEON,
          BUSAN,
          DAEGU,
          DAEJEON,
          GWANGJU,
          ULSAN,
          SEJONG,
          GANGWON,
          CHUNGBUK,
          CHUNGNAM,
          JEONBUK,
          JEONNAM,
          GYEONGBUK,
          GYEONGNAM,
          JEJU,
        ]
    Difficulty:
      description: |
        난이도 (V0~V10)
      type: string
      enum: [V0, V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]
    DayType:
      description: |
        영업시간 요일 타입 (MON 월요일 ~ SUN 일요일)
      type: string
      enum: [MON, TUE, WED, THU, FRI, SAT, SUN]
    GymPerceivedDifficulty:
      description: 체감 난이도 (EASY 쉬움, NORMAL 보통, HARD 어려움)
      type: string
      enum: [EASY, NORMAL, HARD]
    CommunityCategory:
      description: |
        게시글 카테고리 (FREE 자유, TIPS 팁/노하우, REVIEW 후기, MEETUP 모임, GEAR 장비)
      type: string
      enum: [FREE, TIPS, REVIEW, MEETUP, GEAR]
    NotificationType:
      description: |
        알림 타입 (COMMENT 댓글, LIKE 좋아요, FOLLOW 팔로우, SYSTEM 시스템, GYM_UPDATE 암장 업데이트)
      type: string
      enum: [COMMENT, LIKE, FOLLOW, SYSTEM, GYM_UPDATE]
    FacilityType:
      description: |
        암장 시설 타입 (PARKING 주차장, SHOWER 샤워실, LOCKER 락커, REST_AREA 휴식 공간, TRAINING 트레이닝 시설)
      type: string
      enum: [PARKING, SHOWER, LOCKER, REST_AREA, TRAINING]
    AttemptResult:
      description: |
        시도 결과 (SEND 완등, ATTEMPT 시도, FLASH 플래시, ONSIGHT 온사이트)
      type: string
      enum: [SEND, ATTEMPT, FLASH, ONSIGHT]
    GymReviewFeature:
      description: |
        암장 리뷰 특징 (COOL_AIR 쾌적한 냉방, WIDE_STRETCH 넓은 스트레칭존, VARIOUS_LEVEL 다양한 난이도,
        KIND_STAFF 친절한 스태프, EASY_PARKING 주차 편리, SHOWER_ROOM 샤워실 완비,
        CLEAN_FACILITY 깨끗한 시설, GOOD_VENT 환기 좋음)
      type: string
      enum:
        - COOL_AIR
        - WIDE_STRETCH
        - VARIOUS_LEVEL
        - KIND_STAFF
        - EASY_PARKING
        - SHOWER_ROOM
        - CLEAN_FACILITY
        - GOOD_VENT
    Role:
      description: 유저 권한 (ADMIN 관리자, MANAGER 매니저, GUEST 일반)
      type: string
      enum: [ADMIN, MANAGER, GUEST]

    # ── Common ──
    AuthorSummary:
      type: object
      required: [id, nickname, profileImage]
      properties:
        id: { type: string, format: uuid }
        nickname: { type: string }
        profileImage: { type: string, nullable: true }

    MeStatisticsPayload:
      type: object
      required:
        - period
        - anchor
        - range
        - previousRange
        - kpis
        - trend
        - difficultyDistribution
        - sendAttempt
        - topGyms
        - insights
      properties:
        period:
          type: string
          enum: [week, month, year, all]
        anchor: { type: string, description: yyyy-MM-dd }
        range:
          type: object
          required: [start, end, label]
          properties:
            start: { type: string, format: date-time }
            end: { type: string, format: date-time }
            label: { type: string }
        previousRange:
          nullable: true
          type: object
          required: [start, end]
          properties:
            start: { type: string, format: date-time }
            end: { type: string, format: date-time }
        kpis:
          type: object
          required:
            - totalSends
            - sendDeltaPercent
            - uniqueGyms
            - sessionCount
            - workoutMinutesTotal
          properties:
            totalSends: { type: integer }
            sendDeltaPercent: { type: integer, nullable: true }
            uniqueGyms: { type: integer }
            sessionCount: { type: integer }
            workoutMinutesTotal: { type: integer, nullable: true }
        trend:
          type: object
          required: [buckets, peakBucketKey]
          properties:
            peakBucketKey: { type: string, nullable: true }
            buckets:
              type: array
              items:
                type: object
                required: [key, sends, label]
                properties:
                  key: { type: string }
                  sends: { type: integer }
                  label: { type: string }
        difficultyDistribution:
          type: array
          items:
            type: object
            required: [difficulty, count]
            properties:
              difficulty: { $ref: "#/components/schemas/Difficulty" }
              count: { type: integer }
        sendAttempt:
          type: object
          required: [sendCount, attemptCount, totalRoutes, percent]
          properties:
            sendCount: { type: integer }
            attemptCount: { type: integer }
            totalRoutes: { type: integer }
            percent: { type: integer, nullable: true }
        topGyms:
          type: array
          items:
            type: object
            required: [gymId, name, address, thumbnailUrl, visitCount]
            properties:
              gymId: { type: string, format: uuid }
              name: { type: string }
              address: { type: string }
              thumbnailUrl: { type: string, nullable: true }
              visitCount: { type: integer }
        insights:
          type: array
          items:
            type: object
            required: [variant, message]
            properties:
              variant: { type: string, enum: [primary, tertiary] }
              message: { type: string }

    # ── Gym ──
    GymImage:
      description: 암장 이미지
      type: object
      required: [id, gymId, url, order, createdAt]
      properties:
        id: { type: string, format: uuid, description: 이미지 고유 ID }
        gymId: { type: string, format: uuid, description: 암장 ID }
        url: { type: string, description: 이미지 URL }
        order: { type: integer, description: 순서 }
        createdAt: { type: string, format: date-time, description: 생성일 }

    GymOpenHour:
      description: 암장 영업시간 (요일별 한 슬롯, gym_open_hours)
      type: object
      required: [id, gymId, dayType, open, close]
      properties:
        id: { type: string, format: uuid, description: 고유 ID }
        gymId: { type: string, format: uuid, description: 암장 ID }
        dayType:
          $ref: "#/components/schemas/DayType"
        open: { type: string, description: '오픈 시간 "HH:mm"' }
        close: { type: string, description: '마감 시간 "HH:mm"' }

    GymDifficultyColor:
      description: 암장별 난이도 색상·표시명 (gym_difficulty_colors)
      type: object
      required: [id, gymId, difficulty, color, label, order]
      properties:
        id: { type: string, format: uuid, description: 고유 ID }
        gymId: { type: string, format: uuid, description: 암장 ID }
        difficulty: { $ref: "#/components/schemas/Difficulty" }
        color: { type: string, description: "HEX 색상 (예: #E05555)" }
        label: { type: string, description: 암장 자체 난이도 명칭 }
        order: { type: integer, description: 표시 순서 }

    GymMembershipBrand:
      type: string
      description: 암장 회원권 브랜드(체인). STANDALONE은 구매·세션 지점 일치만 허용
      enum:
        - THE_CLIMB
        - SEOULFOREST
        - CLIMBINGPARK
        - STANDALONE

    GymListItem:
      description: 암장 (목록/상세 공통 필드; API는 Prisma Gym + 실시간 visitorCount 등)
      type: object
      required:
        [
          id,
          name,
          address,
          region,
          phone,
          openHours,
          congestion,
          visitorCount,
          visitorCapacity,
          latitude,
          longitude,
          description,
          avgRating,
          reviewCount,
          createdAt,
          updatedAt,
          membershipBrand,
          facilities,
          images,
        ]
      properties:
        id: { type: string, format: uuid, description: 암장 고유 ID }
        name: { type: string, description: 암장 이름 }
        address: { type: string, description: 주소 }
        region: { $ref: "#/components/schemas/Region" }
        phone: { type: string, description: 전화번호 }
        notice:
          type: string
          nullable: true
          description: '영업시간 공지 (예: "명절 당일 휴무")'
        openHours:
          type: array
          description: 요일별 영업시간 (GymOpenHour 관계)
          items: { $ref: "#/components/schemas/GymOpenHour" }
        congestion:
          type: integer
          description: 현재 혼잡도 (0~100)
        visitorCount:
          type: integer
          description: 현재 추정 이용 인원 (실시간 체크인 집계로 덮어쓸 수 있음)
        monthlyCheckInCount:
          type: integer
          nullable: true
          description: 이번 달 체크인 횟수 (정렬·목록 전용)
        visitorCapacity:
          type: integer
          description: 수용 인원 (혼잡도 카드 분모)
        latitude: { type: number, description: 위도 }
        longitude: { type: number, description: 경도 }
        description: { type: string, description: 설명 }
        avgRating: { type: number, description: 평균 평점 }
        reviewCount: { type: integer, description: 리뷰 수 }
        website: { type: string, nullable: true, description: 웹사이트 URL }
        thumbnailUrl:
          { type: string, nullable: true, description: 목록/카드용 썸네일 }
        instagramId: { type: string, nullable: true, description: 인스타그램 아이디 }
        createdAt: { type: string, format: date-time, description: 생성일 }
        updatedAt: { type: string, format: date-time, description: 수정일 }
        membershipBrand: { $ref: "#/components/schemas/GymMembershipBrand" }
        facilities:
          type: array
          description: 시설 목록 (스칼라 enum 배열)
          items: { $ref: "#/components/schemas/FacilityType" }
        images:
          type: array
          description: 이미지 목록 (목록 API는 take 1 등으로 제한될 수 있음)
          items: { $ref: "#/components/schemas/GymImage" }
        difficultyColors:
          type: array
          description: 암장별 난이도표 (상세 GET 등에서 포함; 목록은 빈 배열 또는 생략)
          items: { $ref: "#/components/schemas/GymDifficultyColor" }

    MembershipPlanCode:
      type: string
      enum:
        - PERIOD_1M
        - PERIOD_3M
        - PERIOD_6M
        - PERIOD_12M
        - COUNT_DAY
        - COUNT_3
        - COUNT_5
        - COUNT_10

    GymMembershipPlan:
      description: 암장별 회원권 요금표 행
      type: object
      required:
        [id, gymId, code, priceWon, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        gymId: { type: string, format: uuid }
        code: { $ref: "#/components/schemas/MembershipPlanCode" }
        priceWon: { type: integer }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    GymMembershipPlanSummary:
      type: object
      required: [id, code, priceWon, sortOrder, isActive]
      properties:
        id: { type: string, format: uuid }
        code: { $ref: "#/components/schemas/MembershipPlanCode" }
        priceWon: { type: integer }
        sortOrder: { type: integer }
        isActive: { type: boolean }

    MembershipPauseItem:
      type: object
      required: [id, startDateYmd, endDateYmd, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        startDateYmd: { type: string }
        endDateYmd: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    UserMembership:
      description: 유저 보유 회원권 (직렬화 응답)
      type: object
      required:
        [
          id,
          userId,
          gymId,
          planId,
          startedAt,
          startedDateYmd,
          createdAt,
          updatedAt,
          plan,
          gym,
          pauses,
          effectiveEndAt,
          lastValidDateYmd,
          isActive,
        ]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        gymId: { type: string, format: uuid }
        planId: { type: string, format: uuid }
        startedAt: { type: string, format: date-time }
        startedDateYmd: { type: string }
        remainingUses: { type: integer, nullable: true }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        plan: { $ref: "#/components/schemas/GymMembershipPlanSummary" }
        gym:
          type: object
          required: [id, name, membershipBrand]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            membershipBrand: { $ref: "#/components/schemas/GymMembershipBrand" }
        pauses:
          type: array
          items: { $ref: "#/components/schemas/MembershipPauseItem" }
        effectiveEndAt: { type: string, format: date-time }
        lastValidDateYmd: { type: string }
        isActive: { type: boolean }

    CreateUserMembershipBody:
      type: object
      required: [gymId, planId, startedDateYmd]
      properties:
        gymId: { type: string, format: uuid }
        planId: { type: string, format: uuid }
        startedDateYmd: { type: string }
        note: { type: string, maxLength: 500 }

    PatchUserMembershipBody:
      type: object
      properties:
        note: { type: string, nullable: true, maxLength: 500 }
        startedDateYmd: { type: string }

    CreateMembershipPauseBody:
      type: object
      required: [startDateYmd, endDateYmd]
      properties:
        startDateYmd: { type: string }
        endDateYmd: { type: string }

    PatchMembershipPauseBody:
      type: object
      properties:
        startDateYmd: { type: string }
        endDateYmd: { type: string }

    GymDetail:
      allOf:
        - $ref: "#/components/schemas/GymListItem"
        - type: object
          properties:
            membershipPlans:
              type: array
              items: { $ref: "#/components/schemas/GymMembershipPlan" }
            myCheckIn:
              type: object
              nullable: true
              required: [endsAt]
              properties:
                endsAt: { type: string, format: date-time }

    CheckInResult:
      type: object
      required: [endsAt]
      properties:
        endsAt: { type: string, format: date-time }

    CheckOutResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    PaginatedGymListItem:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/GymListItem" }
        nextCursor: { type: string, nullable: true }

    # ── Review ──
    Review:
      description: 암장 리뷰 (작성 응답 등, user 미포함일 수 있음)
      type: object
      required: [id, userId, gymId, rating, content, imageUrls, features, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        gymId: { type: string, format: uuid }
        rating: { type: integer, description: 평점 (1~5) }
        content: { type: string, description: 리뷰 내용 }
        perceivedDifficulty:
          $ref: "#/components/schemas/GymPerceivedDifficulty"
          nullable: true
        features:
          type: array
          items: { $ref: "#/components/schemas/GymReviewFeature" }
        imageUrls:
          type: array
          description: 이미지 URL 목록
          items: { type: string, format: uri }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ReviewListItem:
      description: 리뷰 목록 항목 (작성자 user 포함)
      type: object
      required:
        [
          id,
          userId,
          gymId,
          rating,
          content,
          imageUrls,
          createdAt,
          updatedAt,
          user,
          features,
        ]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        gymId: { type: string, format: uuid }
        rating: { type: integer }
        content: { type: string }
        perceivedDifficulty:
          $ref: "#/components/schemas/GymPerceivedDifficulty"
          nullable: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/AuthorSummary" }
        features:
          type: array
          items: { $ref: "#/components/schemas/GymReviewFeature" }
        imageUrls:
          type: array
          items: { type: string, format: uri }

    PaginatedReviewListItem:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ReviewListItem" }
        nextCursor: { type: string, nullable: true }

    CreateReviewBody:
      type: object
      required: [rating, content]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        content: { type: string, minLength: 10, maxLength: 1000 }
        perceivedDifficulty:
          $ref: "#/components/schemas/GymPerceivedDifficulty"
        features:
          type: array
          items: { $ref: "#/components/schemas/GymReviewFeature" }
        imageUrls:
          type: array
          items: { type: string, format: uri }

    UpdateReviewBody:
      allOf:
        - $ref: "#/components/schemas/CreateReviewBody"

    # ── Record / Session ──
    Route:
      description: 클라이밍 루트 기록 (routes 테이블)
      type: object
      required: [id, sessionId, difficulty, result, attempts, order, createdAt]
      properties:
        id: { type: string, format: uuid }
        sessionId: { type: string, format: uuid }
        difficulty: { $ref: "#/components/schemas/Difficulty" }
        result: { $ref: "#/components/schemas/AttemptResult" }
        attempts: { type: integer }
        perceivedDifficulty:
          $ref: "#/components/schemas/GymPerceivedDifficulty"
          nullable: true
        memo: { type: string, nullable: true }
        order: { type: integer }
        createdAt: { type: string, format: date-time }

    GymSummary:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        difficultyColors:
          type: array
          description: 암장별 난이도 색상 (기록 목록 GET에서 포함)
          items: { $ref: "#/components/schemas/GymDifficultyColor" }

    RecordListItem:
      description: 클라이밍 세션 목록 항목 (climbing_sessions)
      type: object
      required:
        [
          id,
          userId,
          gymId,
          date,
          startTime,
          endTime,
          memo,
          isPublic,
          createdAt,
          updatedAt,
          gym,
          routes,
          imageUrls,
        ]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        gymId: { type: string, format: uuid }
        userMembershipId: { type: string, format: uuid, nullable: true }
        date: { type: string, format: date-time }
        startTime: { type: string, format: date-time, nullable: true }
        endTime: { type: string, format: date-time, nullable: true }
        memo: { type: string, nullable: true }
        isPublic: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        gym: { $ref: "#/components/schemas/GymSummary" }
        routes:
          type: array
          items: { $ref: "#/components/schemas/Route" }
        imageUrls:
          type: array
          description: 세션 이미지 URL 목록
          items: { type: string, format: uri }

    RecordDetail:
      description: 기록 상세 (세션 + 작성자)
      type: object
      required:
        [
          id,
          userId,
          gymId,
          date,
          startTime,
          endTime,
          memo,
          isPublic,
          createdAt,
          updatedAt,
          gym,
          routes,
          imageUrls,
          user,
        ]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        gymId: { type: string, format: uuid }
        userMembershipId: { type: string, format: uuid, nullable: true }
        date: { type: string, format: date-time }
        startTime: { type: string, format: date-time, nullable: true }
        endTime: { type: string, format: date-time, nullable: true }
        memo: { type: string, nullable: true }
        isPublic: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        gym:
          type: object
          required: [id, name, address]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            address: { type: string }
        routes:
          type: array
          items: { $ref: "#/components/schemas/Route" }
        imageUrls:
          type: array
          items: { type: string, format: uri }
        user: { $ref: "#/components/schemas/AuthorSummary" }
        userMembership:
          description: 작성자 본인 조회 시에만 포함 (타인 열람 시 null)
          nullable: true
          $ref: "#/components/schemas/RecordUserMembershipSummary"

    RecordUserMembershipSummary:
      type: object
      required: [id, gym, plan]
      properties:
        id: { type: string, format: uuid }
        gym:
          type: object
          required: [id, name]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
        plan:
          type: object
          required: [code]
          properties:
            code: { $ref: "#/components/schemas/MembershipPlanCode" }

    UserMembershipUsagePayload:
      type: object
      required: [membership, stats, sessions]
      properties:
        membership:
          type: object
          required:
            [
              id,
              gymId,
              planCode,
              startedDateYmd,
              lastValidDateYmd,
              remainingDays,
              gym,
            ]
          properties:
            id: { type: string, format: uuid }
            gymId: { type: string, format: uuid }
            planCode: { $ref: "#/components/schemas/MembershipPlanCode" }
            startedDateYmd: { type: string }
            lastValidDateYmd: { type: string }
            remainingUses: { type: integer, nullable: true }
            remainingDays: { type: integer }
            gym:
              type: object
              required: [id, name, membershipBrand]
              properties:
                id: { type: string, format: uuid }
                name: { type: string }
                membershipBrand: { $ref: "#/components/schemas/GymMembershipBrand" }
        stats:
          type: object
          required: [totalUsed, weeklyAverage]
          properties:
            totalUsed: { type: number }
            weeklyAverage: { type: number }
            usageRatePercent: { type: number, nullable: true }
            initialCount: { type: integer, nullable: true }
        sessions:
          type: array
          items:
            type: object
            required: [id, date, gymName, routeCount]
            properties:
              id: { type: string, format: uuid }
              date: { type: string, format: date-time }
              gymName: { type: string }
              routeCount: { type: integer }

    PaginatedRecordListItem:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/RecordListItem" }
        nextCursor: { type: string, nullable: true }

    CreateRouteBody:
      type: object
      required: [difficulty, result]
      properties:
        difficulty: { $ref: "#/components/schemas/Difficulty" }
        result: { $ref: "#/components/schemas/AttemptResult" }
        attempts: { type: integer, minimum: 1, default: 1 }
        memo: { type: string, maxLength: 200 }

    CreateSessionBody:
      type: object
      required: [gymId, date, routes]
      properties:
        gymId: { type: string, format: uuid }
        userMembershipId: { type: string, format: uuid, nullable: true }
        date: { type: string, format: date-time }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        memo: { type: string, maxLength: 500 }
        isPublic: { type: boolean, default: true }
        routes:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/CreateRouteBody" }
        imageUrls:
          type: array
          items: { type: string, format: uri }

    UpdateSessionBody:
      type: object
      properties:
        date: { type: string, format: date-time }
        userMembershipId: { type: string, format: uuid, nullable: true }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        memo: { type: string, maxLength: 500, nullable: true }
        isPublic: { type: boolean }
        routes:
          type: array
          items: { $ref: "#/components/schemas/CreateRouteBody" }
        imageUrls:
          type: array
          items: { type: string, format: uri }

    # ── Post ──
    Post:
      description: 커뮤니티 게시글 (posts)
      type: object
      required:
        [
          id,
          authorId,
          category,
          title,
          content,
          viewCount,
          likeCount,
          commentCount,
          tags,
          imageUrls,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        category: { $ref: "#/components/schemas/CommunityCategory" }
        title: { type: string }
        content: { type: string }
        viewCount: { type: integer }
        likeCount: { type: integer }
        commentCount: { type: integer }
        tags:
          type: array
          description: 태그 문자열 목록
          items: { type: string }
        imageUrls:
          type: array
          description: 이미지 URL 목록
          items: { type: string, format: uri }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PostListItem:
      description: 게시글 목록 항목
      type: object
      required:
        [
          id,
          authorId,
          category,
          title,
          content,
          viewCount,
          likeCount,
          commentCount,
          createdAt,
          updatedAt,
          author,
          tags,
          imageUrls,
        ]
      properties:
        id: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        category: { $ref: "#/components/schemas/CommunityCategory" }
        title: { type: string }
        content: { type: string }
        viewCount: { type: integer }
        likeCount: { type: integer }
        commentCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/AuthorSummary" }
        tags:
          type: array
          items: { type: string }
        imageUrls:
          type: array
          items: { type: string, format: uri }
        likes:
          type: array
          items:
            type: object
            required: [id]
            properties:
              id: { type: string, format: uuid }
        bookmarks:
          type: array
          items:
            type: object
            required: [id]
            properties:
              id: { type: string, format: uuid }

    PostDetail:
      description: 게시글 상세
      type: object
      required:
        [
          id,
          authorId,
          category,
          title,
          content,
          viewCount,
          likeCount,
          commentCount,
          createdAt,
          updatedAt,
          author,
          tags,
          imageUrls,
        ]
      properties:
        id: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        category: { $ref: "#/components/schemas/CommunityCategory" }
        title: { type: string }
        content: { type: string }
        viewCount: { type: integer }
        likeCount: { type: integer }
        commentCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/AuthorSummary" }
        tags:
          type: array
          items: { type: string }
        imageUrls:
          type: array
          items: { type: string, format: uri }
        likes:
          type: array
          items:
            type: object
            required: [id]
            properties:
              id: { type: string, format: uuid }
        bookmarks:
          type: array
          items:
            type: object
            required: [id]
            properties:
              id: { type: string, format: uuid }

    PaginatedFollowUser:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AuthorSummary" }
        nextCursor: { type: string, format: uuid, nullable: true }

    PaginatedPostListItem:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PostListItem" }
        nextCursor: { type: string, nullable: true }

    CreatePostBody:
      type: object
      required: [category, title, content]
      properties:
        category: { $ref: "#/components/schemas/CommunityCategory" }
        title: { type: string, minLength: 2, maxLength: 100 }
        content: { type: string, minLength: 10, maxLength: 5000 }
        tags:
          type: array
          maxItems: 5
          items: { type: string, maxLength: 20 }
        imageUrls:
          type: array
          maxItems: 10
          items: { type: string, format: uri }

    UpdatePostBody:
      type: object
      properties:
        title: { type: string, minLength: 2, maxLength: 100 }
        content: { type: string, minLength: 10, maxLength: 5000 }
        category: { $ref: "#/components/schemas/CommunityCategory" }
        tags:
          type: array
          maxItems: 5
          items: { type: string, maxLength: 20 }
        imageUrls:
          type: array
          maxItems: 10
          items: { type: string, format: uri }

    # ── Comment ──
    CommentWithAuthor:
      type: object
      required:
        [id, postId, authorId, parentId, content, createdAt, updatedAt, author]
      properties:
        id: { type: string, format: uuid }
        postId: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        parentId: { type: string, format: uuid, nullable: true }
        content: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/AuthorSummary" }

    CommentListItem:
      type: object
      required:
        [
          id,
          postId,
          authorId,
          parentId,
          content,
          createdAt,
          updatedAt,
          author,
          replies,
        ]
      properties:
        id: { type: string, format: uuid }
        postId: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        parentId: { type: string, format: uuid, nullable: true }
        content: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/AuthorSummary" }
        replies:
          type: array
          items: { $ref: "#/components/schemas/CommentWithAuthor" }

    PaginatedCommentListItem:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CommentListItem" }
        nextCursor: { type: string, nullable: true }

    CreateCommentBody:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 1000 }
        parentId: { type: string, format: uuid }

    UpdateCommentBody:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 1000 }

    # ── User ──
    User:
      type: object
      required:
        [
          id,
          email,
          nickname,
          bio,
          profileImage,
          coverImage,
          instagramId,
          youtubeUrl,
          maxDifficulty,
          role,
          checkInAutoDurationMinutes,
          createdAt,
          updatedAt,
          homeGym,
        ]
      properties:
        id: { type: string, format: uuid }
        homeGymId: { type: string, format: uuid, nullable: true }
        homeGym:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/HomeGymSummary"
        email: { type: string, format: email }
        nickname: { type: string }
        bio: { type: string, nullable: true }
        profileImage: { type: string, nullable: true }
        coverImage: { type: string, nullable: true }
        instagramId: { type: string, nullable: true }
        youtubeUrl: { type: string, nullable: true }
        maxDifficulty:
          { $ref: "#/components/schemas/Difficulty", nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        checkInAutoDurationMinutes:
          type: integer
          minimum: 30
          maximum: 720
          description: "체크인 후 자동 체크아웃까지 분 (기본 240)"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    UserCounts:
      type: object
      required: [following, followers, sessions]
      properties:
        following: { type: integer }
        followers: { type: integer }
        sessions: { type: integer }

    ActiveCheckIn:
      type: object
      required: [id, gymId, gymName, startedAt, endsAt]
      properties:
        id: { type: string, format: uuid }
        gymId: { type: string, format: uuid }
        gymName: { type: string }
        startedAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }

    HomeGymSummary:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    UserMe:
      type: object
      required:
        [
          id,
          email,
          nickname,
          bio,
          profileImage,
          coverImage,
          instagramId,
          youtubeUrl,
          maxDifficulty,
          role,
          createdAt,
          updatedAt,
          _count,
          visitCount,
          sendCount,
          checkInAutoDurationMinutes,
          linkedProviders,
          activeCheckIn,
          homeGym,
        ]
      properties:
        id: { type: string, format: uuid }
        homeGymId: { type: string, format: uuid, nullable: true }
        homeGym:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/HomeGymSummary"
        email: { type: string, format: email }
        nickname: { type: string }
        bio: { type: string, nullable: true }
        profileImage: { type: string, nullable: true }
        coverImage: { type: string, nullable: true }
        instagramId: { type: string, nullable: true }
        youtubeUrl: { type: string, nullable: true }
        maxDifficulty:
          { $ref: "#/components/schemas/Difficulty", nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        _count: { $ref: "#/components/schemas/UserCounts" }
        visitCount: { type: integer, description: "방문한 서로 다른 암장 수" }
        sendCount: { type: integer, description: "완등(SEND) 누적" }
        checkInAutoDurationMinutes:
          type: integer
          minimum: 30
          maximum: 720
          description: "체크인 후 자동 체크아웃까지 분 (기본 240)"
        linkedProviders:
          type: array
          description: "Supabase에 연결된 소셜 로그인 (카카오·구글)"
          items:
            type: string
            enum: [KAKAO, GOOGLE]
        activeCheckIn:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ActiveCheckIn"

    UserProfile:
      type: object
      required:
        [
          id,
          homeGymId,
          nickname,
          bio,
          profileImage,
          coverImage,
          instagramId,
          youtubeUrl,
          maxDifficulty,
          createdAt,
          _count,
          visitCount,
          sendCount,
          activityHeatmap,
          activityHeatmapDays,
          activityHeatmapSessionCount,
          homeGym,
        ]
      properties:
        id: { type: string, format: uuid }
        homeGymId: { type: string, format: uuid, nullable: true }
        homeGym:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/HomeGymSummary"
        nickname: { type: string }
        bio: { type: string, nullable: true }
        profileImage: { type: string, nullable: true }
        coverImage: { type: string, nullable: true }
        instagramId: { type: string, nullable: true }
        youtubeUrl: { type: string, nullable: true }
        maxDifficulty:
          { $ref: "#/components/schemas/Difficulty", nullable: true }
        createdAt: { type: string, format: date-time }
        _count: { $ref: "#/components/schemas/UserCounts" }
        visitCount: { type: integer }
        sendCount: { type: integer }
        activityHeatmap:
          type: array
          items: { type: integer, minimum: 0, maximum: 4 }
          description: "2026-01-01 이후 ~ 오늘, 월요일 시작 주 그리드 활동 강도 (0~4)"
        activityHeatmapDays:
          type: array
          items: { type: string, format: date }
          description: "각 히트맵 셀 날짜 (yyyy-MM-dd), activityHeatmap과 동일 순서"
        activityHeatmapSessionCount:
          type: integer
          description: "2026-01-01 ~ 오늘 사이 공개 세션 개수"
        followers:
          type: array
          items:
            type: object
            required: [id]
            properties:
              id: { type: string, format: uuid }

    UpdateUserBody:
      type: object
      properties:
        nickname: { type: string, minLength: 1, maxLength: 20 }
        bio: { type: string, maxLength: 200 }
        profileImage: { type: string, format: uri }
        coverImage: { type: string, format: uri }
        instagramId: { type: string, maxLength: 50 }
        youtubeUrl: { type: string, format: uri, maxLength: 200 }
        maxDifficulty: { $ref: "#/components/schemas/Difficulty" }
        checkInAutoDurationMinutes:
          type: integer
          minimum: 30
          maximum: 720
          description: "체크인 후 자동 체크아웃까지 분"
        homeGymId:
          type: string
          format: uuid
          nullable: true
          description: "홈짐 설정 — null이면 해제"

    # ── Notification ──
    Notification:
      type: object
      required: [id, userId, type, title, message, isRead, createdAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/NotificationType" }
        title: { type: string }
        message: { type: string }
        isRead: { type: boolean }
        link: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    PaginatedNotification:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Notification" }
        nextCursor: { type: string, nullable: true }
